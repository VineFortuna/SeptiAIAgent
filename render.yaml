services:
  - type: web
    name: sep7ro-whatsapp-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 60
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: VALIDATE_TWILIO_SIGNATURE
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: STAFF_NOTIFICATION_PHONE
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
